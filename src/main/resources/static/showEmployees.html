<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="style.css">
    <style>
        body {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        form {
            padding: 20px;
            border: 1px solid #ccc;
            width: 400px;
            display: flex;
            flex-direction: column;
            gap: 1em;
            margin-bottom: 2rem;
        }

        .hidden {
            display: none;
        }

        tbody tr {
            cursor: pointer;
        }

        tbody tr td button {
            pointer-events: all;
        }
    </style>
    <title>Employee Page</title>
</head>

<body>
<header id="index-header">
    <h2>KinoXP</h2>
    <a href="index.html">Log out</a>
</header>

<h1 class="text-center">Ansatte</h1>

<form id="employeeForm">
    <input type="hidden" id="id" name="id">
    <input type="text" id="name" name="name" placeholder="Indtast navn på ansat" required>
    <input type="text" id="role" name="role" placeholder="Indtast rolle for ansat" required>
    <input type="text" id="username" name="username" placeholder="Indtast brugernavn for ansat" required>
    <input type="password" id="password" name="password" placeholder="Indtast adgangskode for ansat" required>
    <button type="button" id="cancelEditBtn" class="btn btn-secondary hidden">Cancel Edit</button>
    <button type="submit" class="btn btn-primary">Tilføj Ansat</button>
</form>

<table class="table">
    <thead>
    <tr>
        <th scope="col">Name</th>
        <th scope="col">Rolle</th>
        <th scope="col">Brugernavn</th>
        <th scope="col">Adgangskode</th>
        <th scope="col">Actions</th>
    </tr>
    </thead>
    <tbody id="employeeTableBody">
    </tbody>
</table>

<script type="module" src="employee.admin.js"></script>
</body>

</html>
