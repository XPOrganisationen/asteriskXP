name: Build and test
run-name: Build and test

on:
  pull_request:
    branches:
      - main

  workflow_dispatch: # Manual triggering and triggering from publish.yaml.

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # Version 6.0.2 on 26/02/2026
      - name: JDK setup
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # Version 5.2.0 on 26/02/2026
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Cache dependencies
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # Version 5.0.3 on 27/02/2026
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Run tests
        run: mvn -B test